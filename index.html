<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌹 Tanisha's Eternal Rose</title>
    <style>
        :root {
            --rose-pink: #ff4d6d;
            --rose-deep: #e11d48;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 45% 25%, #4a1f3a, #1a0f1f, #0a0a12);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Poppins', cursive;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }

        /* Floating petals */
        .floating-petal {
            position: absolute;
            background: rgba(255, 105, 180, 0.35);
            border-radius: 50% 20% 70% 30%;
            width: 16px; 
            height: 22px;
            animation: floatPetal 20s linear infinite;
            z-index: 1;
            opacity: 0.55;
        }

        @keyframes floatPetal {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-40vh) rotate(380deg); }
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 560px;
            padding: 20px 15px;
        }

        .flower-container {
            position: relative;
            height: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .rose-wrapper {
            perspective: 1300px;
            margin-bottom: -60px;
        }

        .rose {
            position: relative;
            width: 340px;
            height: 340px;
            animation: gentleSway 4.2s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes gentleSway {
            0%, 100% { transform: translateY(0) rotate(-1.5deg); }
            50% { transform: translateY(-10px) rotate(1.5deg); }
        }

        .petal {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle at 32% 28%, #ff6b8a, var(--rose-deep), #c0265e);
            border-radius: 75% 25% 85% 20%;
            box-shadow: 0 12px 30px rgba(0,0,0,0.45),
                        inset 0 6px 15px rgba(255,255,255,0.35),
                        0 0 25px rgba(255,80,140,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11.8px;
            font-weight: 600;
            color: #fff9f0;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            cursor: grab;
            touch-action: none;
            z-index: 20;
            transition: transform 0.1s ease;
        }

        .petal.dragging {
            z-index: 1000;
            filter: brightness(1.2) drop-shadow(0 25px 45px rgba(255,90,140,0.75));
            transform: scale(1.12) !important;
        }

        .petal.pulled-out {
            position: fixed !important;
            z-index: 200;
            animation: petalFloat 2.8s ease forwards;
        }

        @keyframes petalFloat {
            to { 
                transform: scale(1.18) rotate(18deg) translateY(-35px); 
            }
        }

        /* Petal positions */
        .petal1 { transform: rotate(0deg) translate(42px, -32px) rotate(12deg); }
        .petal2 { transform: rotate(45deg) translate(48px, -34px) rotate(25deg); }
        .petal3 { transform: rotate(90deg) translate(44px, -30px) rotate(20deg); }
        .petal4 { transform: rotate(135deg) translate(46px, -35px) rotate(28deg); }
        .petal5 { transform: rotate(180deg) translate(40px, -28px) rotate(15deg); }
        .petal6 { transform: rotate(225deg) translate(47px, -33px) rotate(30deg); }
        .petal7 { transform: rotate(270deg) translate(43px, -31px) rotate(18deg); }
        .petal8 { transform: rotate(315deg) translate(41px, -29px) rotate(22deg); }

        .inner-petal { 
            width: 78px; 
            height: 78px; 
            font-size: 10.2px; 
        }

        .rose-center {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 74px; 
            height: 74px;
            background: radial-gradient(circle, #ffe38a, #ff9f1c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17.5px;
            color: #fff8e0;
            box-shadow: 0 0 0 7px #ffeb9e, 0 15px 35px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 50;
        }

        .stem {
            width: 16px;
            height: 175px;
            background: linear-gradient(to bottom, #2e7d32, #166534);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            position: relative;
            margin-top: -25px;
        }

        .leaf {
            position: absolute;
            width: 54px;
            height: 33px;
            background: linear-gradient(145deg, #4ade5a, #22c55e);
            border-radius: 80% 15% 75% 25%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .leaf1 { left: -39px; top: 52px; transform: rotate(-36deg); }
        .leaf2 { right: -41px; top: 98px; transform: rotate(56deg); }

        .greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 2.1rem;
            background: linear-gradient(90deg, #ffb3c6, #ff8fab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0 8px;
        }

        .sub {
            font-size: 0.9rem;
            color: #e8c8b8;
            background: rgba(255,255,255,0.07);
            padding: 10px 24px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 18px;
        }

        .reset-btn {
            background: linear-gradient(135deg, rgba(255,180,200,0.3), rgba(255,140,160,0.2));
            border: 2px solid #ff9ab8;
            color: #ffe0e8;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.05rem;
        }

        .message-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,10,35,0.96);
            backdrop-filter: blur(30px);
            color: #ffe8d4;
            padding: 18px 28px;
            border-radius: 9999px;
            max-width: 92vw;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 300;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .message-popup.show { 
            opacity: 1; 
            transform: translateX(-50%) scale(1); 
        }

        /* Mobile Responsiveness */
        @media (max-width: 520px) {
            .rose { 
                width: 290px; 
                height: 290px; 
            }
            .petal { 
                width: 96px; 
                height: 96px; 
            }
            .inner-petal { 
                width: 68px; 
                height: 68px; 
            }
            .flower-container {
                height: 460px;
            }
            .greeting {
                font-size: 1.85rem;
            }
        }

        @media (max-width: 380px) {
            .rose { 
                width: 260px; 
                height: 260px; 
            }
            .petal { 
                width: 86px; 
                height: 86px; 
            }
        }
    </style>
</head>
<body>

<div class="floating-petal" style="left:12%; animation-duration:23s;"></div>
<div class="floating-petal" style="left:78%; animation-duration:17s; animation-delay:-7s;"></div>
<div class="floating-petal" style="left:28%; animation-duration:26s; animation-delay:-11s;"></div>

<div class="main-container">
    <div class="flower-container">
        <!-- Rose -->
        <div class="rose-wrapper">
            <div class="rose" id="rose">
                <div class="petal petal1" data-fullmsg="🌸 Tanisha, your laughter blooms in my heart every single day. You are my sunshine! 🌸">✨ Pull me ✨</div>
                <div class="petal petal2" data-fullmsg="✨ My world shines brighter because you're in it. I love you endlessly, Tanisha ✨">💖 Pull me 💖</div>
                <div class="petal petal3" data-fullmsg="💖 Your kindness is a rare bloom. Thank you for being my greatest gift 💖">🌹 Pull me 🌹</div>
                <div class="petal petal4" data-fullmsg="🌹 Tanisha, among a thousand roses, you'll always be my favorite. Forever yours 🌹">💕 Pull me 💕</div>
                <div class="petal petal5" data-fullmsg="💫 You are the poetry my soul always wanted to write. Love you beyond measure 💫">🌟 Pull me 🌟</div>
                <div class="petal petal6" data-fullmsg="🍃 With you, my heart finds peace. You lift me higher every day, my love 🍃">💗 Pull me 💗</div>
                <div class="petal petal7" data-fullmsg="🌟 Your love is my guiding star. Shine on, beautiful Tanisha 🌟">✨ Pull me ✨</div>
                <div class="petal petal8" data-fullmsg="💕 Each petal of this rose whispers your name. I'm forever grateful for you 💕">🌸 Pull me 🌸</div>

                <div class="petal inner-petal petal9" data-fullmsg="❤️ Tanisha, you are my heartbeat, my calm, my everything. I adore you endlessly ❤️">💞 Pull me 💞</div>
                <div class="petal inner-petal petal10" data-fullmsg="🌙 Even the moon envies your glow. You are my dream come true, my forever love 🌙">🌙 Pull me 🌙</div>
                <div class="petal inner-petal petal11" data-fullmsg="🌸 Hand in hand, our love blooms eternally. You make my life a fairytale, Tanisha 🌸">💫 Pull me 💫</div>
                <div class="petal inner-petal petal12" data-fullmsg="✨ You turned my world into a garden of joy. I'm the luckiest because of you ✨">❤️ Pull me ❤️</div>

                <div class="rose-center" data-fullmsg="💗 My Dearest Tanisha, Happy Flower Day! This magical rose is filled with my love for you... 💗">🌹 Tanisha ❤️</div>
            </div>
        </div>

        <!-- Stem -->
        <div class="stem">
            <div class="leaf leaf1"></div>
            <div class="leaf leaf2"></div>
        </div>
    </div>

    <div class="greeting">🌹 Tanisha's Eternal Rose 🌹</div>
    <div class="sub">Gently drag any petal outward to reveal a secret love note 💌</div>
    
    <button class="reset-btn" id="resetBtn">🌸 Reset All Petals</button>
</div>

<div id="popup" class="message-popup"></div>

<script>
    const petals = document.querySelectorAll('.petal');
    const roseCenter = document.querySelector('.rose-center');
    const resetBtn = document.getElementById('resetBtn');
    const popup = document.getElementById('popup');

    let activePetal = null, startX = 0, startY = 0, originLeft = 0, originTop = 0;
    let isDragging = false;
    let pulledSet = new Set();
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    function showMessage(msg) {
        popup.textContent = msg;
        popup.classList.add('show');
        clearTimeout(window.popupTimer);
        window.popupTimer = setTimeout(() => {
            popup.classList.remove('show');
        }, 4500);
    }

    // Store original transforms
    petals.forEach(p => p.dataset.originalTransform = p.style.transform);

    function resetPetal(p) {
        p.classList.remove('pulled-out', 'dragging');
        p.style.position = '';
        p.style.left = '';
        p.style.top = '';
        p.style.transform = p.dataset.originalTransform || '';
        p.style.zIndex = '';
        document.getElementById('rose').appendChild(p);
        pulledSet.delete(p);
    }

    function getCoords(e) {
        return e.touches ? 
            {x: e.touches[0].clientX, y: e.touches[0].clientY} : 
            {x: e.clientX, y: e.clientY};
    }

    function startDrag(e) {
        const petal = e.target.closest('.petal');
        if (!petal) return;

        if (pulledSet.has(petal)) {
            showMessage(petal.dataset.fullmsg);
            return;
        }

        e.preventDefault();
        const c = getCoords(e);
        startX = c.x;
        startY = c.y;

        const rect = petal.getBoundingClientRect();
        originLeft = rect.left;
        originTop = rect.top;

        activePetal = petal;
        isDragging = true;
        petal.classList.add('dragging');
        petal.style.position = 'fixed';
        petal.style.left = originLeft + 'px';
        petal.style.top = originTop + 'px';
        petal.style.zIndex = '1000';
    }

    function moveDrag(e) {
        if (!isDragging || !activePetal) return;
        e.preventDefault();

        const c = getCoords(e);
        const sens = isMobile ? 0.75 : 0.85;   // Better sensitivity on mobile
        const dx = (c.x - startX) * sens;
        const dy = (c.y - startY) * sens;

        let nx = originLeft + dx;
        let ny = originTop + dy;

        // Better boundaries for mobile
        nx = Math.max(30, Math.min(window.innerWidth - 140, nx));
        ny = Math.max(40, Math.min(window.innerHeight - 180, ny));

        activePetal.style.left = nx + 'px';
        activePetal.style.top = ny + 'px';
    }

    function endDrag(e) {
        if (!isDragging || !activePetal) return;

        const c = getCoords(e);
        const dist = Math.hypot(c.x - startX, c.y - startY);

        activePetal.classList.remove('dragging');

        if (dist > (isMobile ? 35 : 45)) {
            showMessage(activePetal.dataset.fullmsg);
            activePetal.classList.add('pulled-out');
            pulledSet.add(activePetal);
        } else {
            resetPetal(activePetal);
        }

        isDragging = false;
        activePetal = null;
    }

    // Event Listeners
    petals.forEach(p => {
        p.addEventListener('mousedown', startDrag, { passive: false });
        p.addEventListener('touchstart', startDrag, { passive: false });
    });

    window.addEventListener('mousemove', moveDrag, { passive: false });
    window.addEventListener('mouseup', endDrag, { passive: false });
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('touchend', endDrag, { passive: false });

    resetBtn.addEventListener('click', () => {
        petals.forEach(resetPetal);
        showMessage("🌹 All petals returned beautifully to the rose 💖");
    });

    roseCenter.addEventListener('click', () => showMessage(roseCenter.dataset.fullmsg));

    // Prevent pull-to-refresh on mobile
    document.body.style.overscrollBehavior = 'none';
</script>
</body>
</html>
